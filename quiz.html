<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JP Quiz</title>
<link rel="stylesheet" href="./assets/style.css">
</head>

<body>

<header class="topbar">
<div class="logo">JP Quiz</div>

<div class="top-actions">
<button id="btnTheme">🌙 / ☀️</button>
<button id="btnFullscreen">Plein écran</button>
</div>
</header>

<main class="container">

<div id="hud">
<div id="hudScore">—</div>
<div id="hudMini">—</div>
<div id="hudXP">XP +0</div>
<div id="hudStreak">Streak 0</div>
</div>

<div id="prompt">—</div>
<div id="hint"></div>

<div id="qcm"></div>

<div id="inputRow">
<input id="answer" autocomplete="off">
</div>

<div id="feedback"></div>

<div id="correctionWrap" style="display:none">
<button id="btnCorrection">Correction</button>

<div id="correctionPanel">
<div><b>Kanji</b> <span id="corrKanji"></span></div>
<div><b>ON</b> <span id="corrOn"></span></div>
<div><b>KUN</b> <span id="corrKun"></span></div>
<div><b>Sens</b> <span id="corrMeanings"></span></div>
</div>
</div>

<div class="actions">
<button id="btnNext">Suivant</button>
<button id="btnStop">Arrêter la session</button>
</div>

<div id="footer"></div>

</main>

<script type="module">

import {
loadState,
saveState,
applyTheme,
requestFullscreenToggle,
chooseModePro,
pickRandomEntry,
buildQcmChoices,
setFeedback,
RANK_XP_CAP,
getSessionXpGain,
applyXpToProgression,
canTakeCurrentRankExam,
rankUp
} from "./assets/app.js"

import { HIRAGANA, KATAKANA } from "./assets/data.js"
import { KANJI } from "./assets/kanji.js"


const params = new URLSearchParams(location.search)

const pack = params.get("pack") || "kana"
const mode = params.get("mode") || "normal"
const rank = params.get("rank") || "E"

let app = loadState()

let session = {
pack,
mode,
rank,
asked:0,
good:0,
streak:0,
bestStreakThisSession:0,
locked:false,
correct:null,
correctionData:null
}

const promptEl = document.getElementById("prompt")
const hintEl = document.getElementById("hint")
const qcmEl = document.getElementById("qcm")
const feedbackEl = document.getElementById("feedback")
const answer = document.getElementById("answer")

const btnNext = document.getElementById("btnNext")
const btnStop = document.getElementById("btnStop")
const btnCorrection = document.getElementById("btnCorrection")

const corrKanji = document.getElementById("corrKanji")
const corrOn = document.getElementById("corrOn")
const corrKun = document.getElementById("corrKun")
const corrMeanings = document.getElementById("corrMeanings")

const correctionWrap = document.getElementById("correctionWrap")
const correctionPanel = document.getElementById("correctionPanel")

const hudScore = document.getElementById("hudScore")
const hudMini = document.getElementById("hudMini")
const hudXP = document.getElementById("hudXP")
const hudStreak = document.getElementById("hudStreak")

btnTheme.onclick = ()=>{
app.ui.theme = app.ui.theme === "dark" ? "light":"dark"
applyTheme(app.ui.theme)
saveState(app)
}

btnFullscreen.onclick = requestFullscreenToggle

btnStop.onclick = endSession

btnNext.onclick = ()=>{
nextQuestion()
}

btnCorrection.onclick = ()=>{
correctionPanel.classList.toggle("show")
}

function lock(v){
session.locked = v
}

function updateHud(){
hudScore.textContent = `Bonnes réponses ${session.good}`
hudStreak.textContent = `Streak ${session.streak}`
}

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
;[arr[i],arr[j]]=[arr[j],arr[i]]
}
return arr
}

function buildChoices(correct, pool){
const wrong = pool.filter(x=>x!==correct)
shuffle(wrong)
const out = wrong.slice(0,4)
out.push(correct)
return shuffle(out)
}

function nextQuestion(){

session.asked++
lock(false)

feedbackEl.textContent=""
correctionWrap.style.display="none"
btnNext.style.display="none"

if(pack==="kana"){
askKana()
}else{
askKanji()
}

updateHud()
}

function askKana(){

const mode = chooseModePro(session)

let char,romaji

if(mode==="hira_to_romaji"){
[char,romaji] = pickRandomEntry(HIRAGANA)
promptEl.textContent = char
session.correct = romaji
}

if(mode==="kata_to_romaji"){
[char,romaji] = pickRandomEntry(KATAKANA)
promptEl.textContent = char
session.correct = romaji
}

if(mode==="romaji_to_hira"){
[char,romaji] = pickRandomEntry(HIRAGANA)
promptEl.textContent = romaji
session.correct = char
}

if(mode==="romaji_to_kata"){
[char,romaji] = pickRandomEntry(KATAKANA)
promptEl.textContent = romaji
session.correct = char
}

qcmEl.innerHTML=""

if(mode.includes("romaji")){

const pool = Object.keys(mode.includes("hira")?HIRAGANA:KATAKANA)

const choices = buildChoices(session.correct,pool)

choices.forEach(c=>{
const b=document.createElement("button")
b.textContent=c
b.onclick=()=>submit(c)
qcmEl.appendChild(b)
})

}else{

answer.value=""
answer.focus()

answer.onkeydown = e=>{
if(e.key==="Enter"){
submit(answer.value.trim())
}
}

}

}

function askKanji(){

const item = KANJI[Math.floor(Math.random()*KANJI.length)]

promptEl.textContent = item.k

session.correct = item.m[0]

session.correctionData = item

const pool = KANJI.map(x=>x.m[0])

const choices = buildChoices(session.correct,pool)

qcmEl.innerHTML=""

choices.forEach(c=>{
const b=document.createElement("button")
b.textContent=c
b.onclick=()=>submit(c)
qcmEl.appendChild(b)
})

}

function submit(value){

if(session.locked) return

const ok = value===session.correct

if(ok){
session.good++
session.streak++
session.bestStreakThisSession = Math.max(session.bestStreakThisSession,session.streak)
setFeedback(feedbackEl,"good","Correct")
}else{
session.streak=0
setFeedback(feedbackEl,"bad","Faux")
}

lock(true)

if(pack==="kana"){
setTimeout(()=>{
nextQuestion()
},600)
return
}

correctionWrap.style.display="flex"

corrKanji.textContent = session.correctionData.k
corrOn.textContent = session.correctionData.on.join(" / ")
corrKun.textContent = session.correctionData.kun.join(" / ")
corrMeanings.textContent = session.correctionData.m.join(" • ")

btnNext.style.display="inline-block"

}

function endSession(){

app = loadState()

if(session.bestStreakThisSession > app.progression.bestStreak){
app.progression.bestStreak = session.bestStreakThisSession
}

let gainedXp = 0

if(session.mode !== "exam"){
gainedXp = getSessionXpGain(session)
applyXpToProgression(app.progression,gainedXp)
}

if(session.mode==="exam"){
const success = session.good >= 9
if(success && canTakeCurrentRankExam(app.progression)){
rankUp(app.progression)
}
}

saveState(app)

promptEl.textContent="Session terminée"

hintEl.textContent = `Rang ${app.progression.currentRank} Niveau ${app.progression.level}`

setFeedback(feedbackEl,"",`XP gagnée ${gainedXp}`)

qcmEl.innerHTML=""

}

nextQuestion()

</script>
</body>
</html>
