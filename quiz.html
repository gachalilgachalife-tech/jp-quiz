<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JP Quiz</title>

<link rel="stylesheet" href="./assets/style.css">

</head>


<body>

<header class="topbar">

<div class="brand">
<span class="dot"></span>
<span class="brand-title">JP Quiz</span>
<span id="modeChip" class="chip">—</span>
</div>

<div class="top-actions">

<button id="themeToggle" class="btn secondary">
🌙 / ☀️
</button>

<button id="fullscreenBtn" class="btn secondary">
Plein écran
</button>

<a class="btn secondary" href="./index.html">
Menu
</a>

</div>

</header>


<main class="container">

<section class="card quiz">


<div class="hud" id="hud">

<div class="hud-left">
<div id="hudScore">—</div>
<div id="hudMini">—</div>
</div>

<div class="hud-right">
<div id="hudXP">XP +0</div>
<div id="hudStreak">Streak 0</div>
</div>

</div>


<div id="feedback" class="feedback"></div>

<div id="prompt" class="prompt">—</div>


<div id="answer" class="answer">

<div id="inputRow" class="input-row">

<input id="romajiInput" type="text">

<span id="capsIndicator" class="caps">
CAPS
</span>

</div>


<div id="qcmRow" class="qcm"></div>

<div id="hint" class="hint"></div>


<div id="correctionWrap" class="correction-wrap">

<button id="btnCorrection" class="btn secondary" disabled>
Correction
</button>

</div>


<div id="correctionPanel" class="correction-panel">

<div id="corrKanji" class="corr-title"></div>

<div class="corr-grid">

<div class="corr-box">
<div class="corr-label">Lectures ON</div>
<div id="corrOn"></div>
</div>

<div class="corr-box">
<div class="corr-label">Lectures KUN</div>
<div id="corrKun"></div>
</div>

<div class="corr-box">
<div class="corr-label">Sens</div>
<div id="corrMeanings"></div>
</div>

</div>

</div>

</div>


<div class="footer" id="footer">

<button id="btnStop" class="btn secondary">
Arrêter la session
</button>

<button id="btnNext" class="btn primary" style="display:none;" disabled>
Suivant
</button>

</div>


</section>

</main>



<script type="module">

import { HIRAGANA, KATAKANA } from "./assets/data.js";

import {
loadState,
saveState,
applyTheme,
requestFullscreenToggle,
chooseModePro,
pickRandomEntry,
buildQcmChoices,
setFeedback,
unlockNextRank,
RANKS,
isRankUnlocked
}
from "./assets/app.js";

import { KANJI } from "./assets/kanji.js";

const KANJI_DEMO = KANJI;



const url = new URL(location.href);

const pack = url.searchParams.get("pack") || "kana";
const modeParam = url.searchParams.get("mode") || "normal";
const rankParam = url.searchParams.get("rank") || "E";



const SETTINGS = {

normalQuestions: 10,
examQuestions: 10,
examPassRate: 0.9,
infiniteGoal: 100,
autoNextMs: 600

};



let app = loadState();

applyTheme(app.ui?.theme ?? "dark");



const promptEl = document.getElementById("prompt");
const feedbackEl = document.getElementById("feedback");
const romajiInput = document.getElementById("romajiInput");
const qcmRow = document.getElementById("qcmRow");
const inputRow = document.getElementById("inputRow");
const btnNext = document.getElementById("btnNext");
const btnCorrection = document.getElementById("btnCorrection");
const correctionPanel = document.getElementById("correctionPanel");
const correctionWrap = document.getElementById("correctionWrap");



let session = {

pack,
mode: modeParam,
rank: rankParam,

asked: 0,
good: 0,
streak: 0,

locked: false,

correct: null,
correctionData: null,

examQueue: null,
examIndex: 0

};



function lock(v){

session.locked = v;

romajiInput.disabled = v;

[...qcmRow.querySelectorAll("button")].forEach(b => b.disabled = v);

}



btnNext.addEventListener("click", () => {

btnNext.style.display = "none";
btnNext.disabled = true;

lock(false);

nextQuestion();

});



btnCorrection.addEventListener("click", () => {

if (!session.correctionData) return;

correctionPanel.classList.toggle("show");

});



function nextQuestion(){

btnNext.style.display = "none";
btnNext.disabled = true;

btnCorrection.disabled = true;
correctionWrap.style.display = "none";
correctionPanel.classList.remove("show");

if (session.mode === "normal" && session.asked >= SETTINGS.normalQuestions)
return endSession();

session.asked++;

clearAnswer();

if (session.pack === "kana")
return askKana();

return askKanji();

}



function askKana(){

const type = chooseModePro(session);

if (type === "hira_to_romaji"){

const [char, romaji] = pickRandomEntry(HIRAGANA);

session.correct = romaji;

promptEl.textContent = char;

romajiInput.focus();

}

}



function askKanji(){

const item = KANJI_DEMO[Math.floor(Math.random()*KANJI_DEMO.length)];

session.correct = item.m[0];

session.correctionData = item;

promptEl.textContent = item.k;

qcmRow.innerHTML = "";

const choices = buildQcmChoices(

KANJI_DEMO.map(k=>k.m[0]),
session.correct,
5

);

for (const c of choices){

const b = document.createElement("button");

b.textContent = c;

b.className="btn qcm-btn";

b.onclick=()=>submit(c);

qcmRow.appendChild(b);

}

}



function submit(value){

if (session.locked) return;

const ok = value === session.correct;

if (ok){

session.good++;
setFeedback(feedbackEl,"good","Correct");

}

else{

setFeedback(feedbackEl,"bad","Faux");

}

lock(true);


if (session.pack==="kana"){

setTimeout(()=>{
lock(false);
nextQuestion();
}, SETTINGS.autoNextMs);

return;

}



correctionWrap.style.display="flex";
btnCorrection.disabled=false;

btnNext.style.display="inline-flex";
btnNext.disabled=false;

}



function clearAnswer(){

qcmRow.innerHTML="";
romajiInput.value="";

}



function endSession(){

promptEl.textContent="Fin";

qcmRow.innerHTML="";

}



nextQuestion();

</script>


</body>
</html>
