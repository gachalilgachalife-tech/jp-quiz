<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>JP Quiz</title>

<link rel="stylesheet" href="./assets/style.css">

</head>

<body>

<header class="topbar">

<div class="brand">
<span class="dot"></span>
<span class="brand-title">JP Quiz</span>
<span id="rankChip" class="chip">—</span>
</div>

<div class="top-actions">
<button id="themeToggle" class="btn secondary">🌙 / ☀️</button>
<button id="fullscreenBtn" class="btn secondary">Plein écran</button>
</div>

</header>


<main class="container">

<section class="card">

<h1 class="title">Menu principal</h1>

<div class="progress-box">

<div id="rankLabel" class="rank-label">Rang —</div>

<div id="levelLabel" class="level-label">Niveau —</div>

<div class="progress-bar">
<div id="xpFill" class="progress-fill"></div>
</div>

<div id="xpText" class="xp-text">—</div>

</div>


<div class="menu-buttons">

<a class="btn primary big" href="./quiz.html?pack=kana">
Kana</a>

<a class="btn primary big" href="./quiz.html?pack=kanji">
Kanji</a>

</div>


<div class="stats">

<div id="bestStreak">Streak max : —</div>

<div id="lastNormal">Dernier score normal : —</div>

<div id="lastInfinite">Infini : —</div>

</div>

</section>

</main>


<script type="module">

import {
loadState,
applyTheme,
requestFullscreenToggle,
getLevelXpCap
} from "./assets/app.js"

import { KANJI } from "./assets/kanji.js"

  import {
    loadState,
    saveState,
    applyTheme,
    requestFullscreenToggle,
    getLevelXpCap
  } from "./assets/app.js";

const themeToggle = document.getElementById("themeToggle")
const fullscreenBtn = document.getElementById("fullscreenBtn")

const rankChip = document.getElementById("rankChip")

const rankLabel = document.getElementById("rankLabel")
const levelLabel = document.getElementById("levelLabel")

const xpFill = document.getElementById("xpFill")
const xpText = document.getElementById("xpText")

const bestStreak = document.getElementById("bestStreak")
const lastNormal = document.getElementById("lastNormal")
const lastInfinite = document.getElementById("lastInfinite")


let app = loadState()

applyTheme(app.ui?.theme ?? "dark")


function refreshUI(){

const progression = app.progression || {}

const rank = progression.currentRank || "E"
const level = progression.level || 1
const xp = progression.levelXp || 0

const cap = getLevelXpCap(rank, level, KANJI)

rankChip.textContent = `Rang ${rank}`

rankLabel.textContent = `Rang actuel : ${rank}`

levelLabel.textContent = `Niveau ${level}`

xpText.textContent = `${xp} / ${cap}`

const percent = cap > 0 ? Math.min(100,(xp/cap)*100) : 0

xpFill.style.width = percent + "%"

bestStreak.textContent =
`Streak max : ${progression.bestStreak ?? 0}`

lastNormal.textContent =
`Dernier score normal : ${app.last?.normalScore ?? "-"}`

lastInfinite.textContent =
`Infini (questions pour 100) : ${app.last?.infiniteQuestionsFor100 ?? "-"}`

}


themeToggle?.addEventListener("click",()=>{
  const state = loadState();
  
  state.ui = state.ui || { theme: "dark" };
  state.ui.theme = state.ui.theme === "dark" ? "light" : "dark";
  
  saveState(state);
  applyTheme(state.ui.theme);

  app = state;
});


fullscreenBtn.addEventListener("click",requestFullscreenToggle)


refreshUI()

</script>

</body>
</html>
